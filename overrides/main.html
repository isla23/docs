{% extends "base.html" %}

{% block content %}
  {{ super() }}
  {% if page.meta.comments %}
    <div id="twikoo" style="min-height: 500px;"></div>
    <script src="https://cdn.staticfile.org/twikoo/1.6.41/twikoo.all.min.js"></script>
    <script>
      twikoo.init({
        envId: 'https://300csvercel.vercel.app',
        el: '#twikoo',
        lang: 'zh-CN',
      })
    </script>
    <style>
      /* 隐藏邮箱输入框区域 */
      .tk-meta-input[name="mail"],
      .tk-meta-input[name="mail"] + label,
      /* 隐藏网址输入框区域 */
      .tk-meta-input[name="url"],
      .tk-meta-input[name="url"] + label,
      /* 针对某些版本可能有的不同类名，做额外处理 */
      .tk-row .tk-col-s-6:has(.tk-meta-input[name="mail"]),
      .tk-row .tk-col-s-6:has(.tk-meta-input[name="url"]) {
        display: none !important;
      }
      /* 隐藏设备信息 */
      .tk-comment-card-footer .tk-comment-device {
        display: none !important;
      }
    </style>
  {% endif %}
{% endblock %}
