{% extends "base.html" %}

{% block content %}
  {{ super() }}
  {% if page.meta.comments %}
    <div id="twikoo" style="min-height: 500px;"></div>
    <script src="https://cdn.staticfile.org/twikoo/1.6.41/twikoo.all.min.js"></script>
    <script>
      twikoo.init({
        envId: 'https://300csvercel.vercel.app',
        el: '#twikoo',
        lang: 'zh-CN',
      })
    </script>
    <style>
      /* 隐藏邮箱输入框所在的整个表单项 */
      .tk-meta-item:has(input[name="mail"]),
      .tk-col-s-6:has(input[name="mail"]) {
        display: none !important;
      }
      /* 隐藏网址输入框所在的整个表单项 */
      .tk-meta-item:has(input[name="url"]),
      .tk-col-s-6:has(input[name="url"]) {
        display: none !important;
      }
      /* 隐藏设备信息 */
      .tk-comment-card-footer .tk-comment-device,
      .tk-comment-footer .tk-device {
        display: none !important;
      }
    </style>
  {% endif %}
{% endblock %}
